map $request_method $cosmos_admin_limit_key {
    default "";
    POST $binary_remote_addr;
}

limit_req_zone $cosmos_admin_limit_key zone=cosmos_admin_login:10m rate=5r/m;

server {
    listen 80;
    listen [::]:80;
    server_name cosmos.orbittiff.dev;

    client_max_body_size 10M;

    location /static/ {
        alias /var/lib/cosmos/static/;
        access_log off;
        expires 7d;
        add_header X-Content-Type-Options nosniff always;
    }

    location /media/ {
        alias /var/lib/cosmos/media/;
        access_log off;
        expires 1d;
        add_header X-Content-Type-Options nosniff always;
    }

    location = /admin/login/ {
        limit_req zone=cosmos_admin_login burst=5 nodelay;
        include proxy_params;
        proxy_pass http://unix:/run/cosmos/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/run/cosmos/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
