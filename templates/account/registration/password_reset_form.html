{% extends "shop/base.html" %}
{% block title %}Reset Password – Cosmos Custom Shirts{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">
        <div class="card bg-dark border-secondary shadow">
            <div class="card-body p-4">
                <h2 class="card-title text-center mb-1">Reset Your Password</h2>
                <p class="text-muted text-center mb-4">
                    Enter the email address linked to your account and we will send you a reset link.
                </p>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Email address</label>
                        <input type="email" name="email" class="form-control mb-3"
                               placeholder="your@email.com" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Send reset link</button>
                </form>

                <p class="text-center mt-3 mb-0">
                    <a href="{% url 'account:login' %}">Back to login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
