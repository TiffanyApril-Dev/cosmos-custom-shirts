{% extends "shop/base.html" %}
{% block title %}Password Reset Complete – Cosmos Custom Shirts{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">
        <div class="card bg-dark border-secondary shadow text-center">
            <div class="card-body p-4">
                <h2 class="card-title mb-3">Password Changed</h2>
                <p class="mb-4">Your password has been successfully updated.</p>
                <a href="{% url 'account:login' %}" class="btn btn-primary">Login with new password</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
